services:
  sap-mcp-web:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: sap-mcp-web
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
      - "${MCP_PORT}:${MCP_PORT}"
    volumes:
      - ../config.py:/app/config.py:ro
      - ../utils/config.py:/app/utils/config.py:ro
      - log_volume:/app/log
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - WEB_PORT=${WEB_PORT:-6680}
      - MCP_PORT=${MCP_PORT:-6688}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_PORT}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  log_volume:
    name: sap-mcp-log-volume
